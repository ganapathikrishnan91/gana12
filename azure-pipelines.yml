# Docker + Qualys QScanner Integration
# Pulls a Docker image and scans it using Qualys QScanner

trigger:
- main

resources:
- repo: self

pool:
  name: GANA AZUREDEVOPS  # Replace with your actual agent pool name

variables:
  tag: '$(Build.BuildId)'
  DOCKER_IMAGE: 'mongo:7.0.32-rc1-jammy'   # Change this to any image you want to scan
  QUALYS_POD: 'US1'                          # Change to your Qualys POD (US1, US2, EU1, etc.)

stages:

# ─────────────────────────────────────────
# STAGE 1: Build Docker Image (optional)
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build Docker Image'
  jobs:
  - job: Build
    displayName: 'Build'
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        dockerfile: '**/Dockerfile'
        tags: |
          $(tag)

# ─────────────────────────────────────────
# STAGE 2: Pull Image & Run QScanner
# ─────────────────────────────────────────
- stage: QScannerScan
  displayName: 'Qualys QScanner - Image Scan'
  dependsOn: Build
  jobs:
  - job: ScanImage
    displayName: 'Download and Run QScanner'
    pool:
      vmImage: ubuntu-latest
    steps:

    # Step 1: Pull the Docker image to scan
    - task: Bash@3
      displayName: 'Pull Docker Image'
      inputs:
        targetType: 'inline'
        script: |
          echo "Pulling Docker image: $(DOCKER_IMAGE)"
          docker pull $(DOCKER_IMAGE)
          docker images

    # Step 2: Download QScanner
    - task: Bash@3
      displayName: 'Download QScanner'
      inputs:
        targetType: 'inline'
        script: |
          echo "Downloading Qualys QScanner..."
          wget https://www.qualys.com/qscanner/download/latest/download_qscanner.sh
          chmod +x download_qscanner.sh
          ./download_qscanner.sh
          ls -la
          chmod +x linux-amd64/qscanner
          echo "QScanner downloaded successfully."

    # Step 3: Run QScanner on the pulled image
    - task: Bash@3
      displayName: 'Run QScanner Scan'
      inputs:
        targetType: 'inline'
        script: |
          echo "Starting Qualys QScanner scan on image: $(DOCKER_IMAGE)"
          cd linux-amd64
          ./qscanner image $(DOCKER_IMAGE) \
            --mode get-report \
            --pod $(QUALYS_POD) \
            --access-token $(QUALYS_ACCESS_TOKEN)
      env:
        QUALYS_ACCESS_TOKEN: $(QUALYS_ACCESS_TOKEN)   # Set this as a secret pipeline variable

    # Step 4: Publish scan results as artifact (optional)
    - task: PublishBuildArtifacts@1
      displayName: 'Publish QScanner Report'
      inputs:
        PathtoPublish: 'linux-amd64'
        ArtifactName: 'QScanner-Report'
        publishLocation: 'Container'